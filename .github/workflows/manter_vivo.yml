name: Manter App do Streamlit Vivo

on:
  schedule:
    # A cada 6 horas — bem dentro do limite de 12h de inatividade do Streamlit Cloud
    - cron: '0 */6 * * *'
  workflow_dispatch: # Permite rodar manualmente pelo GitHub para testar

jobs:
  keepalive:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar Playwright e o Chromium
        run: |
          pip install playwright
          playwright install --with-deps chromium

      - name: Visitar o app para mantê-lo (ou acordá-lo)
        run: python manter_vivo.py
